version: "3.9"

networks:
  l2_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-l2
    ipam:
      config:
        - subnet: 192.168.2.0/24
  l3_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-l3
    ipam:
      config:
        - subnet: 192.168.3.0/24
  dmz_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-dmz
    ipam:
      config:
        - subnet: 172.16.0.0/16

services:
  portal:
    build: ./portal/
    volumes:
      - portal-data:/app/config/
    ports:
      - "443:443"

  dmz-firewall:
    build: ./dmz-firewall/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.253
      dmz_network:
        ipv4_address: 172.16.0.253
    ports:
      - "5443:5443"
    volumes:
      - portal-data:/app/portal/

  dmz-transfer:
    build: ./dmz-transfer/
    cap_add:
      - NET_ADMIN
    networks:
      dmz_network:
        ipv4_address: 172.16.0.21
    ports:
      - "4443:80"
    volumes:
      - portal-data:/app/portal/

  router:
    build: ./router/
    cap_add:
      - NET_ADMIN
    networks:
      l2_network:
        ipv4_address: 192.168.2.254
      l3_network:
        ipv4_address: 192.168.3.254

  scada:
    build: ./scada/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.20
    ports:
      - "1881:1881"
    volumes:
      - scada-data:/usr/src/app/FUXA/server/_appdata
    dns:
      - 127.0.0.11

  plc:
    build: ./plc/
    cap_add:
      - NET_ADMIN
    networks:
      l2_network:
        ipv4_address: 192.168.2.10
    ports:
      - "8080:8080"
    volumes:
      - plc-data:/workdir/webserver

  ews:
    build: ./ews/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.11
    ports:
      - "5911:5911"
    volumes:
      - ews-data:/home/engineer/

  pentest:
    build: ./pentest/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      l3_network:
        ipv4_address: 192.168.3.30
    ports:
      - "2222:22"
      - "3443:3443"
    depends_on:
      - portal
    volumes:
      - portal-data:/app/portal/

  ids:
    build: ./ids/
    network_mode: host
    depends_on:
      - portal
    volumes:
      - portal-data:/app/portal/

  collector:
    build: ./collector/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.40
    ports:
      - "2443:2443"
      - "8766:8766"
    depends_on:
      - portal
    volumes:
      - portal-data:/app/portal/

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    depends_on:
      - router
      - plc
    volumes:
      - ./suricata/etc:/etc/suricata
      - ./suricata/log:/var/log/suricata
      - ./suricata/rules:/var/lib/suricata/rules
    entrypoint: >
      sh -c "
        echo 'Waiting for interfaces...' &&
        until ip link show br-l2 > /dev/null 2>&1 && ip link show br-l3 > /dev/null 2>&1; do
          echo 'br-l2/br-l3 not ready yet, retrying in 2s...' && sleep 2;
        done &&
        echo 'Interfaces found. Starting Suricata.' &&
        suricata-update --no-reload &&
        exec suricata -c /etc/suricata/suricata.yaml -i ens33 -i br-l2 -i br-l3
      "
    restart: unless-stopped

  zeek_ens33:
    image: zeek/zeek:latest
    container_name: zeek_ens33
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - router
    volumes:
      - ./zeek/site:/usr/local/zeek/share/zeek/site
      - ./zeek/etc:/usr/local/zeek/etc
      - ./zeek/logs:/usr/local/zeek/logs
    command: >
      sh -c "
        mkdir -p /usr/local/zeek/logs &&
        exec /usr/local/zeek/bin/zeek -C -i ens33 local
      "
    restart: unless-stopped

  zeek_br1:
    image: zeek/zeek:latest
    container_name: zeek_br1
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - plc
    volumes:
      - ./zeek/site:/usr/local/zeek/share/zeek/site
      - ./zeek/etc:/usr/local/zeek/etc
      - ./zeek/logs:/usr/local/zeek/logs
    command: >
      sh -c "
        until ip link show br-l2 > /dev/null 2>&1; do sleep 2; done &&
        exec /usr/local/zeek/bin/zeek -C -i br-l2 local
      "
    restart: unless-stopped

  zeek_br2:
    image: zeek/zeek:latest
    container_name: zeek_br2
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - router
    volumes:
      - ./zeek/site:/usr/local/zeek/share/zeek/site
      - ./zeek/etc:/usr/local/zeek/etc
      - ./zeek/logs:/usr/local/zeek/logs
    command: >
      sh -c "
        until ip link show br-l3 > /dev/null 2>&1; do sleep 2; done &&
        exec /usr/local/zeek/bin/zeek -C -i br-l3 local
      "
    restart: unless-stopped

volumes:
  scada-data:
  plc-data:
  ews-data:
  portal-data:
