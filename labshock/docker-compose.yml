networks:
  l2_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24
  l3_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.3.0/24
  dmz_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/16
  elk_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

services:
  portal:
    build: ./portal/
    volumes:
      - portal-data:/app/config/
    ports:
      - "443:443"

  dmz-firewall:
    build: ./dmz-firewall/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.253
      dmz_network:
        ipv4_address: 172.16.0.253
    ports:
      - "5443:5443"
    volumes:
      - portal-data:/app/portal/

  dmz-transfer:
    build: ./dmz-transfer/
    cap_add:
      - NET_ADMIN
    networks:
      dmz_network:
        ipv4_address: 172.16.0.21
    ports:
      - "4443:80"
    volumes:
      - portal-data:/app/portal/

  router:
    build: ./router/
    cap_add:
      - NET_ADMIN
    networks:
      l2_network:
        ipv4_address: 192.168.2.254
      l3_network:
        ipv4_address: 192.168.3.254

  scada:
    build: ./scada/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.20
    ports:
      - "1881:1881"
    volumes:
      - scada-data:/usr/src/app/FUXA/server/_appdata
    dns:
      - 127.0.0.11

  plc:
    build: ./plc/
    cap_add:
      - NET_ADMIN
    networks:
      l2_network:
        ipv4_address: 192.168.2.10
    ports:
      - "8080:8080"
    volumes:
      - plc-data:/workdir/webserver

  ews:
    build: ./ews/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.11
    ports:
      - "5911:5911"
    volumes:
      - ews-data:/home/engineer/

  pentest:
    build: ./pentest/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      l3_network:
        ipv4_address: 192.168.3.30
    ports:
      - "2222:22"
      - "3443:3443"
    depends_on:
      - portal
    volumes:
      - portal-data:/app/portal/

  ids:
    build: ./ids/
    network_mode: host
    depends_on:
      - portal
    volumes:
      - portal-data:/app/portal/

  collector:
    build: ./collector/
    cap_add:
      - NET_ADMIN
    networks:
      l3_network:
        ipv4_address: 192.168.3.40
    ports:
      - "2443:2443"
      - "8766:8766"
    depends_on:
      - portal
    volumes:
      - portal-data:/app/portal/

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./suricata/etc:/etc/suricata
      - ./suricata/log:/var/log/suricata
      - ./suricata/rules:/var/lib/suricata/rules
    command: -i ens33 -i br-5195aa0d78b9 -i br-f128466d68ef
    restart: unless-stopped

  zeek_ens33:
    image: zeek/zeek:latest
    container_name: zeek_ens33
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek/site:/usr/local/zeek/share/zeek/site
      - ./zeek/etc:/usr/local/zeek/etc
      - ./zeek/logs/ens33:/usr/local/zeek/logs
    command: >
      sh -c "
        mkdir -p /usr/local/zeek/logs &&
        /usr/local/zeek/bin/zeek -C -i ens33 local &&
        sleep infinity
      "
    restart: unless-stopped

  zeek_br1:
    image: zeek/zeek:latest
    container_name: zeek_br1
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek/site:/usr/local/zeek/share/zeek/site
      - ./zeek/etc:/usr/local/zeek/etc
      - ./zeek/logs/br1:/usr/local/zeek/logs
    command: >
      sh -c "
        mkdir -p /usr/local/zeek/logs &&
        /usr/local/zeek/bin/zeek -C -i br-5195aa0d78b9 local &&
        sleep infinity
      "
    restart: unless-stopped

  zeek_br2:
    image: zeek/zeek:latest
    container_name: zeek_br2
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek/site:/usr/local/zeek/share/zeek/site
      - ./zeek/etc:/usr/local/zeek/etc
      - ./zeek/logs/br2:/usr/local/zeek/logs
    command: >
      sh -c "
        mkdir -p /usr/local/zeek/logs &&
        /usr/local/zeek/bin/zeek -C -i br-f128466d68ef local &&
        sleep infinity
      "
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: elasticsearch
    environment:
      - node.name=es01
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=basic
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro 
    ports:
      - "9200:9200"
    networks:
      - elk_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.0
    container_name: kibana
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_FLEET_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - elk_network
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:9.3.0
    container_name: filebeat
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./suricata/log:/var/log/suricata:ro
      - ./zeek/logs/ens33:/var/log/zeek/ens33:ro
      - ./zeek/logs/br1:/var/log/zeek/br1:ro
      - ./zeek/logs/br2:/var/log/zeek/br2:ro
    networks:
      - elk_network
    command: filebeat -e --strict.perms=false
    restart: unless-stopped

volumes:
  scada-data:
  plc-data:
  ews-data:
  portal-data:
  es-data:
